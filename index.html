<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0A1A12">
<title>Huck's Hold'em · Merry Oceans</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;1,9..144,600&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --felt:   #1A4A2E;
  --ocean:  #152E3E;
  --gold:   #D4A843;
  --teal:   #4EA89E;
  --red:    #D6604A;
  --white:  #FFFFFF;
  --text:   #1E2820;
  --correct:#2E9E6B;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; overflow:hidden; font-family:'DM Sans',sans-serif; background:#0A1A12; color:var(--white); }
.app { height:100dvh; display:flex; flex-direction:column; overflow:hidden; }

/* screens */
.screen { position:absolute; inset:0; display:flex; flex-direction:column; transition:opacity 0.3s,transform 0.3s; }
.screen.hidden { opacity:0; transform:translateY(10px); pointer-events:none; }

/* ── JOIN SCREEN ── */
#joinScreen {
  background:#0A1A12; overflow-y:auto;
  align-items:center;
}
#joinScreen::before { content:''; position:fixed; top:0;left:0;right:0;height:40%; background:radial-gradient(ellipse at 50% 0%, rgba(78,168,158,0.12) 0%, transparent 60%); pointer-events:none; }

.join-inner { padding:max(env(safe-area-inset-top),24px) 24px 40px; display:flex; flex-direction:column; align-items:center; width:100%; position:relative; }
.join-logo { width:60px;height:60px;border-radius:50%;overflow:hidden;border:1.5px solid rgba(212,168,67,0.4);margin-bottom:8px; }
.join-logo img { width:100%;height:100%;object-fit:cover; }
.join-prop { font-size:11px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-bottom:20px; }
.join-huck { width:100px;height:100px;border-radius:50%;overflow:hidden;border:2px solid rgba(212,168,67,0.4);box-shadow:0 0 24px rgba(212,168,67,0.15);margin-bottom:14px; }
.join-huck img { width:100%;height:100%;object-fit:cover;object-position:center 10%; }
.join-title { font-family:'Fraunces',serif;font-size:30px;font-weight:600;color:var(--white);margin-bottom:4px; }
.join-title em { color:var(--gold);font-style:italic; }
.join-sub { font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--teal);margin-bottom:24px; }

.field-label { font-size:11px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-bottom:8px;align-self:flex-start;width:100%;max-width:320px; }
.text-input { width:100%;max-width:320px;background:rgba(255,255,255,0.08);border:1.5px solid rgba(255,255,255,0.12);border-radius:12px;padding:13px 16px;font-family:'DM Sans',sans-serif;font-size:16px;color:var(--white);outline:none;margin-bottom:16px; }
.text-input::placeholder { color:rgba(255,255,255,0.3); }
.text-input:focus { border-color:rgba(78,168,158,0.5); }

.join-btn { width:100%;max-width:320px;padding:16px;background:var(--gold);color:#0A1A12;border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:opacity 0.2s; }
.join-btn:disabled { opacity:0.35; }
.join-btn:not(:disabled):active { opacity:0.85; }

.join-error { font-size:13px;color:var(--red);margin-top:8px;text-align:center; }

/* ── WAITING SCREEN ── */
#waitScreen { background:#0A1A12; align-items:center; justify-content:center; gap:20px; }
.wait-logo { width:80px;height:80px;border-radius:50%;overflow:hidden;border:2px solid rgba(212,168,67,0.35); }
.wait-logo img { width:100%;height:100%;object-fit:cover; }
.wait-title { font-family:'Fraunces',serif;font-size:24px;color:var(--white);text-align:center; }
.wait-sub { font-size:14px;color:rgba(255,255,255,0.5);text-align:center; }
.wait-dots { display:flex;gap:8px; }
.wait-dot { width:8px;height:8px;border-radius:50%;background:var(--teal);animation:waitBounce 1.2s ease-in-out infinite; }
.wait-dot:nth-child(2) { animation-delay:0.2s; }
.wait-dot:nth-child(3) { animation-delay:0.4s; }
@keyframes waitBounce { 0%,60%,100% { transform:translateY(0);opacity:0.4; } 30% { transform:translateY(-6px);opacity:1; } }
.wait-players { font-family:'DM Mono',monospace;font-size:18px;color:var(--teal); }

/* ── GAME SCREEN ── */
#gameScreen { background:#0F2330; flex-direction:column; }

.game-header {
  background:#0A1A12; padding:max(env(safe-area-inset-top),14px) 16px 12px;
  display:flex;align-items:center;gap:10px; flex-shrink:0;
  border-bottom:1px solid rgba(255,255,255,0.06);
}
.g-logo { width:34px;height:34px;border-radius:50%;overflow:hidden;border:1px solid rgba(212,168,67,0.3); }
.g-logo img { width:100%;height:100%;object-fit:cover; }
.g-name { font-family:'Fraunces',serif;font-size:16px;font-weight:600;color:var(--white); }
.g-sub { font-size:10px;color:var(--teal);letter-spacing:0.5px; }
.g-chips { margin-left:auto;background:rgba(212,168,67,0.12);border:1px solid rgba(212,168,67,0.25);border-radius:16px;padding:5px 12px;font-family:'DM Mono',monospace;font-size:14px;color:var(--gold); }

.game-body { flex:1;overflow-y:auto;padding:16px 16px 100px;display:flex;flex-direction:column;gap:16px; }

/* Status bar */
.status-bar {
  background:rgba(255,255,255,0.05);border-radius:10px;
  padding:10px 14px;display:flex;align-items:center;justify-content:space-between;
}
.status-round { font-size:11px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.4); }
.status-pot { font-family:'DM Mono',monospace;font-size:18px;color:var(--gold); }
.status-bet { font-size:12px;color:rgba(255,255,255,0.35); }

/* Hole cards */
.cards-section { display:flex;flex-direction:column;gap:8px; }
.cards-label { font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.3);font-weight:600; }
.hole-cards { display:flex;gap:12px;justify-content:center; }
.community-row { display:flex;gap:8px;justify-content:center;flex-wrap:wrap; }

/* Cards */
.card { width:64px;height:90px;border-radius:7px;box-shadow:0 3px 12px rgba(0,0,0,0.5);flex-shrink:0; }
.card-front { background:var(--white);border-radius:7px;width:100%;height:100%;display:flex;flex-direction:column;padding:5px;overflow:hidden; }
.card-back-wrap { background:#1A3A2A;border-radius:7px;width:100%;height:100%;overflow:hidden;border:1.5px solid rgba(212,168,67,0.4); }
.card-back-wrap img { width:100%;height:100%;object-fit:cover;opacity:0.8; }
.c-rank-top { font-family:'DM Mono',monospace;font-size:15px;font-weight:500;line-height:1; }
.c-suit { flex:1;display:flex;align-items:center;justify-content:center;font-size:30px;line-height:1; }
.c-rank-bot { font-family:'DM Mono',monospace;font-size:15px;font-weight:500;line-height:1;transform:rotate(180deg);align-self:flex-end; }
.card.red .c-rank-top,.card.red .c-suit,.card.red .c-rank-bot { color:var(--red); }
.card.black .c-rank-top,.card.black .c-suit,.card.black .c-rank-bot { color:#1A2820; }
.card.small { width:52px;height:72px; }
.card.small .c-rank-top,.card.small .c-rank-bot { font-size:13px; }
.card.small .c-suit { font-size:22px; }

/* Player turn indicator */
.your-turn-banner {
  background:rgba(212,168,67,0.12);border:1.5px solid rgba(212,168,67,0.4);
  border-radius:10px;padding:12px 16px;text-align:center;
  animation:pulseBorder 1.5s ease-in-out infinite;
}
@keyframes pulseBorder { 0%,100% { border-color:rgba(212,168,67,0.4); } 50% { border-color:rgba(212,168,67,0.8); } }
.your-turn-text { font-family:'Fraunces',serif;font-size:20px;color:var(--gold); }
.your-turn-sub { font-size:12px;color:rgba(255,255,255,0.5);margin-top:3px; }

.waiting-banner {
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);
  border-radius:10px;padding:12px 16px;text-align:center;
}
.waiting-name { font-size:14px;color:rgba(255,255,255,0.5); }
.waiting-name span { color:var(--white);font-weight:600; }

.folded-banner {
  background:rgba(214,96,74,0.08);border:1px solid rgba(214,96,74,0.15);
  border-radius:10px;padding:10px 16px;text-align:center;
  font-size:13px;color:rgba(255,255,255,0.4);
}

/* Other players */
.players-grid { display:grid;grid-template-columns:1fr 1fr;gap:8px; }
.mini-player {
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);
  border-radius:8px;padding:10px 12px;
}
.mini-player.active { background:rgba(212,168,67,0.08);border-color:rgba(212,168,67,0.3); }
.mini-player.folded { opacity:0.35; }
.mini-name { font-size:13px;font-weight:600;color:var(--white); }
.mini-chips { font-family:'DM Mono',monospace;font-size:11px;color:var(--teal);margin-top:2px; }
.mini-action { font-size:10px;color:rgba(255,255,255,0.4);margin-top:2px;font-style:italic; }

/* Action buttons */
.action-bar {
  position:fixed;bottom:0;left:0;right:0;
  background:linear-gradient(transparent,#0F2330 40%);
  padding:16px 16px max(env(safe-area-inset-bottom),16px);
  display:flex;gap:8px;
}
.action-bar.hidden { display:none; }
.act-btn {
  flex:1;padding:14px 8px;border:none;border-radius:12px;
  font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;
  cursor:pointer;transition:opacity 0.15s,transform 0.1s;
  display:flex;flex-direction:column;align-items:center;gap:2px;
}
.act-btn:active { transform:scale(0.96); }
.act-btn .act-label { font-size:12px;font-weight:600;letter-spacing:0.5px; }
.act-btn .act-sub { font-size:10px;opacity:0.7; }
.btn-fold { background:rgba(214,96,74,0.15);border:1.5px solid rgba(214,96,74,0.3);color:var(--red); }
.btn-check { background:rgba(78,168,158,0.15);border:1.5px solid rgba(78,168,158,0.3);color:var(--teal); }
.btn-call { background:rgba(78,168,158,0.15);border:1.5px solid rgba(78,168,158,0.3);color:var(--teal); }
.btn-raise { background:rgba(212,168,67,0.15);border:1.5px solid rgba(212,168,67,0.3);color:var(--gold); }

/* Appreciate */
.appreciate-bar {
  background:rgba(255,255,255,0.04);border-top:1px solid rgba(255,255,255,0.06);
  padding:12px 20px max(env(safe-area-inset-bottom),12px);
  display:flex;align-items:center;gap:12px;
  flex-shrink:0;
}
.appreciate-bar img { width:36px;height:36px;border-radius:50%;object-fit:cover; }
.appreciate-text { flex:1;font-size:12px;color:rgba(255,255,255,0.45); }
.appreciate-text strong { color:var(--gold); }
.appreciate-btn {
  background:rgba(212,168,67,0.12);border:1px solid rgba(212,168,67,0.3);
  border-radius:20px;padding:7px 14px;font-size:12px;font-weight:600;
  color:var(--gold);cursor:pointer;transition:all 0.15s;white-space:nowrap;
}
.appreciate-btn:active { background:rgba(212,168,67,0.25); }
.appreciate-btn.thanked { background:rgba(46,158,107,0.15);border-color:rgba(46,158,107,0.4);color:#5DD4A0; }
</style>
</head>

  const nameVal = document.getElementById('nameInput').value.trim();
  const roomVal = document.getElementById('roomInput').value.trim().toUpperCase();
  document.getElementById('joinError').textContent = '';

  // Check game exists
  const rows = await dbGet('holdem_games',`id=eq.${roomVal}&select=state`);
  if(!rows[0]) { document.getElementById('joinError').textContent = 'Room not found. Check the code on the TV.'; return; }

  myName = nameVal;
  roomCode = roomVal;
  const state = rows[0].state;

  // Add player to state
  const players = [...(state.players||[])];
  if(players.find(p=>p.id===myId)) {
    // Already in game - rejoin
  } else if(players.length >= 6) {
    document.getElementById('joinError').textContent = 'Game is full (6 players max).'; return;
  } else {
    players.push({ id:myId, name:nameVal, chips:1000, holeCards:[], currentBet:0, status:'active', lastAction:null });
    await dbPatch('holdem_games',`id=eq.${roomCode}`,{state:{...state,players},updated_at:new Date().toISOString()});
  }

  gameState = {...state, players};
  showScreen('waitScreen');
  document.getElementById('gName').textContent = nameVal;
  subscribeGame();
}

function subscribeGame() {
  const wsUrl = SUPABASE_URL.replace('https','wss') + '/realtime/v1/websocket?apikey=' + ANON_KEY + '&vsn=1.0.0';
  const ws = new WebSocket(wsUrl);
  ws.onopen = () => ws.send(JSON.stringify({topic:`realtime:public:holdem_games:id=eq.${roomCode}`,event:'phx_join',payload:{},ref:'1'}));
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if(msg.event==='UPDATE'&&msg.payload?.record) {
      gameState = msg.payload.record.state;
      updateUI();
    }
  };
  ws.onclose = () => setTimeout(subscribeGame, 2000);
  // Also poll as backup
  setInterval(async () => {
    const rows = await dbGet('holdem_games',`id=eq.${roomCode}&select=state`);
    if(rows[0]?.state) { gameState=rows[0].state; updateUI(); }
  }, 3000);
}

function updateUI() {
  if(!gameState) return;
  const s = gameState;
  const me = s.players.find(p=>p.id===myId);
  if(!me) return;

  document.getElementById('gChips').textContent = me.chips + ' chips';

  // Wait vs game
  if(s.status==='lobby'||s.status==='complete') {
    if(document.getElementById('gameScreen').classList.contains('hidden')) {
      showScreen('waitScreen');
    }
    const pc = s.players.length;
    document.getElementById('waitPlayers').textContent = pc + ' player'+(pc!==1?'s':'')+' joined';
    document.getElementById('waitSub').textContent = pc>=2 ? 'Waiting for host to deal...' : 'Waiting for more players...';
    return;
  }

  showScreen('gameScreen');
  renderGame(s, me);
}

function renderGame(s, me) {
  const isMyTurn = s.players[s.currentIdx]?.id === myId && me.status==='active';
  const isFolded = me.status === 'folded';

  // Action bar
  const bar = document.getElementById('actionBar');
  bar.className = 'action-bar' + (isMyTurn&&!isFolded?'':' hidden');

  if(isMyTurn) {
    const canCheck = me.currentBet >= s.currentBet;
    const callAmt = s.currentBet - me.currentBet;
    const btn = document.getElementById('checkCallBtn');
    btn.className = 'act-btn '+(canCheck?'btn-check':'btn-call');
    document.getElementById('checkCallLabel').textContent = canCheck ? 'Check' : 'Call';
    document.getElementById('checkCallSub').textContent = canCheck ? '' : (callAmt + ' chips');
    document.getElementById('raiseSub').textContent = (s.currentBet*2) + ' chips';
  }

  // Build body
  const body = document.getElementById('gameBody');
  const communityCount = s.community?.length || 0;
  
  const otherPlayers = s.players.filter(p=>p.id!==myId);

  body.innerHTML = `
    <div class="status-bar">
      <div class="status-round">${s.status.toUpperCase()}</div>
      <div>
        <div class="status-pot">Pot: ${s.pot}</div>
        <div class="status-bet">Current bet: ${s.currentBet}</div>
      </div>
    </div>

    <div class="cards-section">
      <div class="cards-label">Your Hand</div>
      <div class="hole-cards" id="holeCardsEl"></div>
    </div>

    ${communityCount > 0 ? `
    <div class="cards-section">
      <div class="cards-label">Community Cards</div>
      <div class="community-row" id="communityEl"></div>
    </div>` : ''}

    ${isMyTurn && !isFolded ? `
    <div class="your-turn-banner">
      <div class="your-turn-text">Your turn!</div>
      <div class="your-turn-sub">Choose an action below</div>
    </div>` : isFolded ? `
    <div class="folded-banner">You folded — watching the rest of the hand</div>` : `
    <div class="waiting-banner">
      <div class="waiting-name">Waiting for <span>${s.players[s.currentIdx]?.name || '...'}</span></div>
    </div>`}

    <div class="cards-section">
      <div class="cards-label">Other Players</div>
      <div class="players-grid" id="playersGridEl"></div>
    </div>
  `;

  // Render hole cards
  const holeEl = document.getElementById('holeCardsEl');
  if(holeEl && me.holeCards?.length) {
    me.holeCards.forEach(c => holeEl.appendChild(makeCard(c,false)));
  } else if(holeEl) {
    for(let i=0;i<2;i++) holeEl.appendChild(makeCardBack());
  }

  // Community
  const commEl = document.getElementById('communityEl');
  if(commEl && s.community) {
    s.community.forEach(c => {
      const card = makeCard(c, true);
      card.classList.add('small');
      commEl.appendChild(card);
    });
  }

  // Other players
  const grid = document.getElementById('playersGridEl');
  if(grid) {
    otherPlayers.forEach(p => {
      const isActive = s.players[s.currentIdx]?.id === p.id;
      const div = document.createElement('div');
      div.className='mini-player'+(isActive?' active':'')+(p.status==='folded'?' folded':'');
      div.innerHTML=`<div class="mini-name">${p.name}</div><div class="mini-chips">${p.chips} chips</div><div class="mini-action">${p.lastAction||''}</div>`;
      grid.appendChild(div);
    });
  }
}

function makeCard(c, small=false) {
  const isRed = SUITS_RED.includes(c.suit);
  const div = document.createElement('div');
  div.className='card '+(isRed?'red':'black')+(small?' small':'');
  div.innerHTML=`<div class="card-front"><div class="c-rank-top">${c.rank}</div><div class="c-suit">${c.suit}</div><div class="c-rank-bot">${c.rank}</div></div>`;
  return div;
}

async function sendAction(action, amount=0) {
  await dbPost('holdem_actions',{game_id:roomCode, player_id:myId, action, amount});
  document.getElementById('actionBar').className='action-bar hidden';
}

function checkOrCall() {
  if(!gameState) return;
  const me = gameState.players.find(p=>p.id===myId);
  const canCheck = me.currentBet >= gameState.currentBet;
  sendAction(canCheck?'check':'call');
}

function doRaise() {
  if(!gameState) return;
  const amt = gameState.currentBet * 2 || 100;
  sendAction('raise', amt);
}

function appreciate() {
  if(appreciated) return;
  appreciated = true;
  const btn = document.getElementById('appreciateBtn');
  btn.textContent = '✓ Appreciated!';
  btn.classList.add('thanked');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.toggle('hidden',s.id!==id));
}
</script>
